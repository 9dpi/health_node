<!DOCTYPE html>
<html lang="vi" x-data="{ 
    role: new URLSearchParams(window.location.search).get('role') || 'relative',
    elderId: new URLSearchParams(window.location.search).get('id') || 'HN-1002',
    elderInfo: { name: 'NGUYỄN VĂN A', age: 75, status: 'Ổn định' },
    vitals: { bp: '120/80', glucose: '5.6', spo2: '98%', weight: '65kg' },
    loading: false
}">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Health Node Mobile App</title>
    <!-- Google Fonts: Be Vietnam Pro -->
    <link href="https://fonts.googleapis.com/css2?family=Be+Vietnam+Pro:wght@400;600;800;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <!-- TailwindCSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script defer src="https://unpkg.com/alpinejs@3.x.x/dist/cdn.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        body { font-family: 'Be Vietnam Pro', sans-serif; -webkit-tap-highlight-color: transparent; display: flex; justify-content: center; align-items: flex-start; min-height: 100vh; padding-top: 40px; background: #e2e8f0; }
        .safe-area-bottom { padding-bottom: env(safe-area-inset-bottom); }
        .glass-card { background: rgba(255, 255, 255, 0.8); backdrop-filter: blur(10px); }
        
        /* Device Frame Styles */
        .iphone-frame {
            position: relative;
            width: 390px;
            height: 844px;
            background: #111;
            border-radius: 60px;
            box-shadow: 0 50px 100px -20px rgba(0,0,0,0.3), 0 0 0 10px #222, 0 0 0 12px #444;
            overflow: hidden;
            border: 4px solid #333;
        }
        .iphone-notch {
            position: absolute;
            top: 0;
            left: 50%;
            transform: translateX(-50%);
            width: 150px;
            height: 30px;
            background: #111;
            border-bottom-left-radius: 20px;
            border-bottom-right-radius: 20px;
            z-index: 100;
        }
        .iphone-screen {
            width: 100%;
            height: 100%;
            overflow-y: auto;
            position: relative;
            background: #fafafa;
        }
        .iphone-screen::-webkit-scrollbar { width: 0; }
        
        /* Fixed components inside screen */
        .fixed-nav { position: absolute !important; }
    </style>
</head>
<body class="bg-slate-200">
    <div class="iphone-frame">
        <div class="iphone-notch"></div>
        <div class="iphone-screen bg-slate-50">

    <!-- Header -->
    <header class="bg-emerald-600 text-white p-6 rounded-b-[40px] shadow-lg">
        <div class="flex justify-between items-start mb-4">
            <div>
                <p class="text-[10px] font-black opacity-80 uppercase tracking-widest">Dành cho <span x-text="role === 'staff' ? 'Bác sĩ/Nhân viên' : 'Người thân'"></span></p>
                <h1 class="text-2xl font-black uppercase" x-text="elderInfo.name"></h1>
            </div>
            <div class="w-12 h-12 bg-white/20 rounded-full flex items-center justify-center text-xl">
                <i class="fas" :class="role === 'staff' ? 'fa-user-md' : 'fa-hand-holding-heart'"></i>
            </div>
        </div>
        <div class="bg-white/10 p-4 rounded-2xl flex items-center justify-between">
            <span class="text-xs font-bold uppercase tracking-tight">Mã định danh: <span x-text="elderId"></span></span>
            <span class="px-2 py-1 bg-emerald-400 text-emerald-900 text-[9px] font-black rounded-lg uppercase">ĐANG THEO DÕI</span>
        </div>
    </header>

    <!-- Main Content -->
    <div class="p-6 space-y-6">
        
        <!-- Vitals Grid -->
        <div class="grid grid-cols-2 gap-4">
            <div class="glass-card p-5 rounded-3xl shadow-sm border border-white">
                <div class="flex items-center gap-3 mb-3">
                    <div class="w-8 h-8 bg-red-100 text-red-600 rounded-xl flex items-center justify-center text-sm"><i class="fas fa-heartbeat"></i></div>
                    <span class="text-[10px] font-black text-slate-400 uppercase">Huyết áp</span>
                </div>
                <div class="text-xl font-black text-slate-800" x-text="vitals.bp"></div>
                <span class="text-[9px] font-bold text-emerald-500 uppercase">Bình thường</span>
            </div>
            <div class="glass-card p-5 rounded-3xl shadow-sm border border-white">
                <div class="flex items-center gap-3 mb-3">
                    <div class="w-8 h-8 bg-blue-100 text-blue-600 rounded-xl flex items-center justify-center text-sm"><i class="fas fa-tint"></i></div>
                    <span class="text-[10px] font-black text-slate-400 uppercase">Đường huyết</span>
                </div>
                <div class="text-xl font-black text-slate-800" x-text="vitals.glucose"></div>
                <span class="text-[9px] font-bold text-slate-400 uppercase">mmol/L</span>
            </div>
            <div class="glass-card p-5 rounded-3xl shadow-sm border border-white">
                <div class="flex items-center gap-3 mb-3">
                    <div class="w-8 h-8 bg-orange-100 text-orange-600 rounded-xl flex items-center justify-center text-sm"><i class="fas fa-lungs"></i></div>
                    <span class="text-[10px] font-black text-slate-400 uppercase">SpO2</span>
                </div>
                <div class="text-xl font-black text-slate-800" x-text="vitals.spo2"></div>
                <span class="text-[9px] font-bold text-emerald-500 uppercase">Tốt</span>
            </div>
            <div class="glass-card p-5 rounded-3xl shadow-sm border border-white">
                <div class="flex items-center gap-3 mb-3">
                    <div class="w-8 h-8 bg-indigo-100 text-indigo-600 rounded-xl flex items-center justify-center text-sm"><i class="fas fa-weight"></i></div>
                    <span class="text-[10px] font-black text-slate-400 uppercase">Cân nặng</span>
                </div>
                <div class="text-xl font-black text-slate-800" x-text="vitals.weight"></div>
                <span class="text-[9px] font-bold text-slate-400 uppercase">Cập nhật 2 ngày trước</span>
            </div>
        </div>

        <!-- History Chart -->
        <div class="bg-white p-6 rounded-[32px] shadow-sm">
            <h3 class="text-xs font-black uppercase text-slate-400 mb-4 tracking-widest">Biểu đồ xu hướng</h3>
            <div class="h-48">
                <canvas id="miniChart"></canvas>
            </div>
        </div>

        <!-- Role Specific Actions -->
        <template x-if="role === 'staff'">
            <div class="space-y-4">
                <button class="w-full bg-slate-900 text-white p-5 rounded-3xl font-black uppercase text-sm shadow-xl shadow-slate-900/20">
                    <i class="fas fa-plus mr-2"></i> Ghi nhận chỉ số mới
                </button>
                <button class="w-full bg-white text-emerald-700 border-2 border-emerald-100 p-5 rounded-3xl font-black uppercase text-sm shadow-sm">
                    <i class="fas fa-file-prescription mr-2"></i> Kê đơn / Nhắc thuốc
                </button>
            </div>
        </template>

        <template x-if="role === 'relative'">
            <div class="bg-hn-secondary/20 p-6 rounded-[32px] border-2 border-hn-secondary/30 relative overflow-hidden">
                <i class="fas fa-check-circle absolute -right-4 -bottom-4 text-8xl text-hn-secondary/20 scale-150 rotate-12"></i>
                <h3 class="text-sm font-black uppercase text-emerald-800 mb-2">Thông báo từ bác sĩ</h3>
                <p class="text-xs font-semibold text-emerald-900/70 leading-relaxed">Kết quả đo sáng nay hoàn toàn bình thường. Ông đã hoàn thành bài tập dưỡng sinh lúc 8:30.</p>
            </div>
        </template>

    </div>

    <!-- Bottom Navigation -->
    <nav class="fixed-nav bottom-6 left-6 right-6 h-16 bg-white shadow-2xl rounded-full flex items-center justify-around px-2 z-50 glass-card safe-area-bottom">
        <a href="#" class="text-emerald-700 text-xl"><i class="fas fa-home"></i></a>
        <a href="#" class="text-slate-300 text-xl"><i class="fas fa-history"></i></a>
        <a href="#" class="text-slate-300 text-xl"><i class="fas fa-bell"></i></a>
        <a href="#" class="text-slate-300 text-xl"><i class="fas fa-cog"></i></a>
    </nav>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const ctx = document.getElementById('miniChart').getContext('2d');
            new Chart(ctx, {
                type: 'line',
                data: {
                    labels: ['T2', 'T3', 'T4', 'T5', 'T6', 'T7'],
                    datasets: [{
                        data: [118, 122, 120, 125, 120, 121],
                        borderColor: '#10b981',
                        borderWidth: 4,
                        fill: false,
                        tension: 0.4,
                        pointRadius: 0
                    }]
                },
                options: {
                    responsive: true, maintainAspectRatio: false,
                    plugins: { legend: { display: false } },
                    scales: { y: { display: false }, x: { grid: { display: false } } }
                }
            });
        });
    </script>
        </div> <!-- iphone-screen -->
    </div> <!-- iphone-frame -->
</body>
</html>
