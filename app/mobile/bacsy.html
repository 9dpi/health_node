<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Health Node - Bác sĩ Ghi nhận</title>
    <link href="https://fonts.googleapis.com/css2?family=Be+Vietnam+Pro:wght@400;600;800;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <script src="https://cdn.tailwindcss.com"></script>
    <script defer src="https://unpkg.com/alpinejs@3.x.x/dist/cdn.min.js"></script>
    <style>
        body { font-family: 'Be Vietnam Pro', sans-serif; display: flex; justify-content: center; align-items: flex-start; min-height: 100vh; padding-top: 40px; background: #e2e8f0; -webkit-tap-highlight-color: transparent; }
        .action-button { background: linear-gradient(135deg, #10b981 0%, #059669 100%); transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275); }
        .action-button:active { transform: scale(0.95); }
        .input-glow:focus { box-shadow: 0 0 0 4px rgba(16, 185, 129, 0.1); }
        
        /* Device Frame Styles */
        .iphone-frame {
            position: relative;
            width: 390px;
            height: 844px;
            background: #111;
            border-radius: 60px;
            box-shadow: 0 50px 100px -20px rgba(0,0,0,0.3), 0 0 0 10px #222, 0 0 0 12px #444;
            overflow: hidden;
            border: 4px solid #333;
        }
        .iphone-notch {
            position: absolute;
            top: 0;
            left: 50%;
            transform: translateX(-50%);
            width: 150px;
            height: 30px;
            background: #111;
            border-bottom-left-radius: 20px;
            border-bottom-right-radius: 20px;
            z-index: 100;
        }
        .iphone-screen {
            width: 100%;
            height: 100%;
            overflow-y: auto;
            position: relative;
            background: #fafafa;
        }
        .iphone-screen::-webkit-scrollbar { width: 0; }
        .fixed-nav { position: absolute !important; }
    </style>
</head>
<body class="bg-slate-200">
    <div class="iphone-frame">
        <div class="iphone-notch"></div>
        <div class="iphone-screen bg-slate-50 pb-20">
    <!-- Top Header -->
    <div style="background-color: #d4e157;" class="text-slate-900 px-6 pb-6 pt-12 rounded-b-[32px] shadow-xl">
        <div class="flex items-center gap-4 mb-4">
            <div class="w-12 h-12 bg-black/10 rounded-2xl flex items-center justify-center text-xl text-emerald-800">
                <i class="fas fa-user-md"></i>
            </div>
            <div>
                <h1 class="text-lg font-black uppercase">BS. PHẠM ĐỨC MẠNH</h1>
                <p class="text-[10px] font-bold text-slate-700 uppercase tracking-widest">Đội phản ứng nhanh #01</p>
            </div>
        </div>
        <div class="bg-black/5 border border-black/10 px-4 py-3 rounded-2xl flex items-center justify-between text-xs font-bold text-emerald-800">
            <span>CA TRỰC: 08:00 - 17:00</span>
            <span class="flex items-center gap-1.5"><div class="w-2 h-2 bg-emerald-600 rounded-full animate-pulse"></div> TRỰC TUYẾN</span>
        </div>
    </div>

    <!-- Main Content -->
    <div class="p-6 space-y-6" x-data="{ 
        elderId: '', step: 1,
        mockElders: {
            'HN-1002': { name: 'TRẦN THỊ HƯƠNG', history: 'Tiểu đường tuýp 2', alert: 'Cao huyết áp' }
        },
        currentElder: null,
        scan() {
            this.elderId = 'HN-1002';
        },
        confirm() {
            if(this.elderId === 'HN-1002') {
                this.currentElder = this.mockElders['HN-1002'];
                this.step = 2;
            } else {
                alert('Không tìm thấy dữ liệu CC/ID này trên hệ thống!');
            }
        }
    }">
        
        <!-- Step 1: Scan / Input ID -->
        <div x-show="step === 1" class="space-y-4">
            <h2 class="text-sm font-black text-slate-900 uppercase">1. QUÉT MÃ / NHẬP ID THÀNH VIÊN</h2>
            <div class="relative">
                <input type="text" x-model="elderId" placeholder="Nhập ID (VD: HN-1002)..." class="w-full bg-white px-6 py-5 rounded-3xl border-none shadow-sm text-sm font-black uppercase text-emerald-800 focus:ring-2 focus:ring-emerald-500 outline-none">
                <button @click="scan()" class="absolute right-4 top-1/2 -translate-y-1/2 w-10 h-10 bg-emerald-100 text-emerald-600 rounded-xl flex items-center justify-center">
                    <i class="fas fa-qrcode"></i>
                </button>
            </div>
            <button @click="confirm()" class="w-full action-button text-white p-5 rounded-3xl font-black uppercase text-sm shadow-xl shadow-emerald-500/20">Xác nhận Thành viên</button>
        </div>

        <!-- Step 2: Vitals Input -->
        <div x-show="step === 2" class="space-y-6 animate-fade-in" style="display: none;">
            <div class="flex justify-between items-center">
                <div>
                    <h2 class="text-sm font-black text-slate-900 uppercase">2. GHI NHẬN CHỈ SỐ</h2>
                    <p class="text-[10px] font-bold text-emerald-600 uppercase mt-1">THÀNH VIÊN: <span x-text="currentElder ? currentElder.name : ''"></span></p>
                </div>
                <button @click="step = 1; elderId = '';" class="text-[10px] font-black text-slate-400 uppercase">Đổi người</button>
            </div>

            <template x-if="currentElder && currentElder.alert">
                <div class="bg-red-50 p-4 rounded-xl border border-red-100">
                    <p class="text-[10px] font-black tracking-wider text-red-600 uppercase">Cảnh báo hệ thống: <span x-text="currentElder.alert"></span></p>
                </div>
            </template>

            <div class="bg-white p-6 rounded-[32px] shadow-sm space-y-6">
                <!-- Huyết áp -->
                <div class="space-y-2">
                    <label class="text-[10px] font-black text-slate-400 uppercase flex justify-between">
                        Huyết áp (mmHg) <span class="text-emerald-500">Mục tiêu: 120/80</span>
                    </label>
                    <input type="text" placeholder="120/80" class="w-full bg-slate-50 px-6 py-4 rounded-2xl border-none font-black text-lg text-slate-800 input-glow outline-none">
                </div>

                <!-- SpO2 -->
                <div class="space-y-2">
                    <label class="text-[10px] font-black text-slate-400 uppercase">Nồng độ Oxy (SpO2 %)</label>
                    <input type="number" placeholder="98" class="w-full bg-slate-50 px-6 py-4 rounded-2xl border-none font-black text-lg text-slate-800 input-glow outline-none">
                </div>

                <!-- Chẩn đoán nhanh -->
                <div class="space-y-2">
                    <label class="text-[10px] font-black text-slate-400 uppercase">Chẩn đoán / Ghi chú nhanh</label>
                    <textarea placeholder="Tình trạng ổn định..." class="w-full bg-slate-50 px-6 py-4 rounded-2xl border-none font-bold text-sm text-slate-800 input-glow outline-none h-24"></textarea>
                </div>
            </div>

            <button class="w-full action-button text-white p-5 rounded-3xl font-black uppercase text-sm shadow-xl shadow-emerald-500/20">Lưu thông tin & Gửi báo cáo</button>
        </div>

    </div>

    <!-- Bottom Nav -->
    <nav class="fixed-nav bottom-0 left-0 right-0 h-16 bg-white border-t flex items-center justify-around px-2 z-50">
        <a href="#" class="text-emerald-600 text-xl"><i class="fas fa-edit"></i></a>
        <a href="#" class="text-slate-300 text-xl"><i class="fas fa-list-ul"></i></a>
        <a href="#" class="text-slate-300 text-xl"><i class="fas fa-bell"></i></a>
    </nav>
        </div> <!-- iphone-screen -->
    </div> <!-- iphone-frame -->
</body>
</html>
