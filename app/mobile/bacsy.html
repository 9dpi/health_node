<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Health Node - Bác sĩ Ghi nhận</title>
    <link href="https://fonts.googleapis.com/css2?family=Be+Vietnam+Pro:wght@400;600;800;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <script src="https://cdn.tailwindcss.com"></script>
    <script defer src="https://unpkg.com/alpinejs@3.x.x/dist/cdn.min.js"></script>
    <style>
        body { font-family: 'Be Vietnam Pro', sans-serif; background: #f8fafc; }
        .action-button { background: linear-gradient(135deg, #10b981 0%, #059669 100%); transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275); }
        .action-button:active { transform: scale(0.95); }
        .input-glow:focus { box-shadow: 0 0 0 4px rgba(16, 185, 129, 0.1); }
    </style>
</head>
<body class="pb-20">
    <!-- Top Header -->
    <div class="bg-slate-900 text-white p-6 rounded-b-[32px] shadow-xl">
        <div class="flex items-center gap-4 mb-4">
            <div class="w-12 h-12 bg-white/10 rounded-2xl flex items-center justify-center text-xl text-emerald-400">
                <i class="fas fa-user-md"></i>
            </div>
            <div>
                <h1 class="text-lg font-black uppercase">BS. PHẠM ĐỨC MẠNH</h1>
                <p class="text-[10px] font-bold text-slate-400 uppercase tracking-widest">Đội phản ứng nhanh #01</p>
            </div>
        </div>
        <div class="bg-white/5 border border-white/10 px-4 py-3 rounded-2xl flex items-center justify-between text-xs font-bold text-emerald-400">
            <span>CA TRỰC: 08:00 - 17:00</span>
            <span class="flex items-center gap-1.5"><div class="w-2 h-2 bg-emerald-500 rounded-full animate-pulse"></div> TRỰC TUYẾN</span>
        </div>
    </div>

    <!-- Main Content -->
    <div class="p-6 space-y-6" x-data="{ elderId: '', step: 1 }">
        
        <!-- Step 1: Scan / Input ID -->
        <div x-show="step === 1" class="space-y-4">
            <h2 class="text-sm font-black text-slate-900 uppercase">1. QUÉT MÃ / NHẬP ID THÀNH VIÊN</h2>
            <div class="relative">
                <input type="text" x-model="elderId" placeholder="Nhập ID (VD: HN-1002)..." class="w-full bg-white px-6 py-5 rounded-3xl border-none shadow-sm text-sm font-black uppercase text-emerald-800 focus:ring-2 focus:ring-emerald-500 outline-none">
                <button class="absolute right-4 top-1/2 -translate-y-1/2 w-10 h-10 bg-emerald-100 text-emerald-600 rounded-xl flex items-center justify-center">
                    <i class="fas fa-qrcode"></i>
                </button>
            </div>
            <button @click="if(elderId) step = 2" class="w-full action-button text-white p-5 rounded-3xl font-black uppercase text-sm shadow-xl shadow-emerald-500/20">Xác nhận Thành viên</button>
        </div>

        <!-- Step 2: Vitals Input -->
        <div x-show="step === 2" class="space-y-6 animate-fade-in" style="display: none;">
            <div class="flex justify-between items-center">
                <h2 class="text-sm font-black text-slate-900 uppercase">2. GHI NHẬN CHỈ SỐ</h2>
                <button @click="step = 1" class="text-[10px] font-black text-slate-400 uppercase">Đổi người</button>
            </div>

            <div class="bg-white p-6 rounded-[32px] shadow-sm space-y-6">
                <!-- Huyết áp -->
                <div class="space-y-2">
                    <label class="text-[10px] font-black text-slate-400 uppercase flex justify-between">
                        Huyết áp (mmHg) <span class="text-emerald-500">Mục tiêu: 120/80</span>
                    </label>
                    <input type="text" placeholder="120/80" class="w-full bg-slate-50 px-6 py-4 rounded-2xl border-none font-black text-lg text-slate-800 input-glow outline-none">
                </div>

                <!-- SpO2 -->
                <div class="space-y-2">
                    <label class="text-[10px] font-black text-slate-400 uppercase">Nồng độ Oxy (SpO2 %)</label>
                    <input type="number" placeholder="98" class="w-full bg-slate-50 px-6 py-4 rounded-2xl border-none font-black text-lg text-slate-800 input-glow outline-none">
                </div>

                <!-- Chẩn đoán nhanh -->
                <div class="space-y-2">
                    <label class="text-[10px] font-black text-slate-400 uppercase">Chẩn đoán / Ghi chú nhanh</label>
                    <textarea placeholder="Tình trạng ổn định..." class="w-full bg-slate-50 px-6 py-4 rounded-2xl border-none font-bold text-sm text-slate-800 input-glow outline-none h-24"></textarea>
                </div>
            </div>

            <button class="w-full action-button text-white p-5 rounded-3xl font-black uppercase text-sm shadow-xl shadow-emerald-500/20">Lưu thông tin & Gửi báo cáo</button>
        </div>

    </div>

    <!-- Bottom Nav -->
    <nav class="fixed bottom-0 left-0 right-0 h-16 bg-white border-t flex items-center justify-around px-2 z-50">
        <a href="#" class="text-emerald-600 text-xl"><i class="fas fa-edit"></i></a>
        <a href="#" class="text-slate-300 text-xl"><i class="fas fa-list-ul"></i></a>
        <a href="#" class="text-slate-300 text-xl"><i class="fas fa-bell"></i></a>
    </nav>
</body>
</html>
